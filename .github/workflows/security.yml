name: Security checks

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install checks
        run: python -m pip install detect-secrets
      - name: Scan maintained code for secrets
        run: |
          detect-secrets scan src .github pyproject.toml > detect-secrets.json
          python -c "import json,sys; data=json.load(open('detect-secrets.json')); sys.exit(bool(data.get('results')))"
      - name: Test command-safety regressions
        run: |
          python -m pip install -e ".[dev]"
          pytest tests/unit/test_command.py -q

  live-scope:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Verify live Arbitrum authorization snapshot
        env:
          SCBOUNTY_LIVE_SCOPE: "1"
        run: pytest tests/integration/test_live_scope.py -q

