name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff format --check .
          ruff check .
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest --cov=scbounty --cov-report=term-missing
      - name: CLI smoke
        run: |
          scbounty env doctor
          scbounty targets list
          scbounty targets show arbitrum

  solidity-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install Slither and Semgrep
        run: python -m pip install slither-analyzer semgrep
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: v1.7.1
      - name: Validate local Semgrep rules
        run: semgrep scan --validate --config semgrep/solidity
      - name: Scan educational fixture
        run: >-
          semgrep scan --config semgrep/solidity --metrics=off --no-git-ignore
          tests/fixtures/toy_bridge/src
      - name: Run local Foundry fixtures
        run: |
          forge test --root tests/fixtures/toy_bridge -vv
          forge test --root tests/fixtures/retryable_alias_recovery -vv
